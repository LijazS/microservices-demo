apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-agic-ingress
  namespace: default
  annotations:
    # Tells AGIC to process this Ingress.
    kubernetes.io/ingress.class: azure/application-gateway

    # Application Gateway communicates with the frontend pods using HTTP.
    appgw.ingress.kubernetes.io/backend-protocol: "http"

    # Application Gateway health probe configuration.
    # The frontend must return a successful response from "/".
    appgw.ingress.kubernetes.io/health-probe-path: "/"
    appgw.ingress.kubernetes.io/health-probe-port: "80"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"
    appgw.ingress.kubernetes.io/health-probe-interval: "30"
    appgw.ingress.kubernetes.io/health-probe-timeout: "30"
    appgw.ingress.kubernetes.io/health-probe-unhealthy-threshold: "3"

    # Gracefully remove pods during scaling or rolling updates.
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"

    # Request timeout between Application Gateway and the frontend.
    appgw.ingress.kubernetes.io/request-timeout: "30"

spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80